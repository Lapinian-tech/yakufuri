<script>
var currentLevel=2,currentFontSize=16,translationHistory=[],currentResult='';
var CACHE_KEY='yakuburi_cache_v2';

// ===== DICTIONARY (loaded from server) =====
var builtinDict = {};
var idioms = [];
var _dictLoaded = false;

async function loadDictionary() {
  try {
    var res = await fetch('./dictionary.json', { cache: 'default' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    builtinDict = data.words || {};
    idioms = data.idioms || [];
    _dictLoaded = true;
  } catch(e) {
    console.warn('辞書の読み込みに失敗しました。内蔵辞書を使用します。', e);
    // フォールバック：最低限の辞書
    builtinDict = {
      a:'一つの',an:'一つの',the:'その',is:'です',are:'です',was:'でした',
      be:'ある',have:'持つ',has:'持つ',do:'する',will:'～だろう',can:'できる',
      not:'～ない',and:'そして',or:'または',but:'しかし',in:'～の中に',
      on:'～の上に',at:'～で',to:'～へ',of:'～の','for':'～のために'
    };
    idioms = [["for example","例えば"],["as a result","その結果"],["in order to","～するために"]];
    _dictLoaded = true;
  }
  idioms.sort(function(a,b){ return b[0].split(' ').length - a[0].split(' ').length; });
}

var skipWordsLv2={i:1,my:1,me:1,mine:1,you:1,your:1,yours:1,he:1,his:1,him:1,she:1,her:1,hers:1,it:1,its:1,we:1,our:1,us:1,ours:1,they:1,their:1,them:1,theirs:1,the:1};

function getCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'{}')}catch(e){return{}}}
function saveCache(c){try{localStorage.setItem(CACHE_KEY,JSON.stringify(c))}catch(e){}}
function updateCacheInfo(){var c=getCache();document.getElementById('cacheInfo').textContent='キャッシュ: '+Object.keys(c).length+'語保存済み';}
function clearCache(){localStorage.removeItem(CACHE_KEY);updateCacheInfo();}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ===== FIX 1: STEMMING for case-insensitive + inflection lookup =====
function lookupInDict(word) {
  var w = word.toLowerCase();
  if (builtinDict[w]) return builtinDict[w];
  var forms = [];
  // -ing: reporting->report, writing->write, running->run
  if (w.length > 4 && w.endsWith('ing')) {
    var b = w.slice(0,-3);
    forms.push(b, b+'e');
    if (b.length > 2 && b[b.length-1]===b[b.length-2]) forms.push(b.slice(0,-1));
  }
  // -ed: edited->edit, loved->love, stopped->stop, studied->study
  if (w.length > 3 && w.endsWith('ed')) {
    var b2 = w.slice(0,-2);
    forms.push(b2, b2+'e');
    if (b2.length > 2 && b2[b2.length-1]===b2[b2.length-2]) forms.push(b2.slice(0,-1));
    if (w.endsWith('ied')) forms.push(w.slice(0,-3)+'y');
  }
  // -s/-es/-ies
  if (w.length > 3 && w.endsWith('ies')) forms.push(w.slice(0,-3)+'y');
  if (w.length > 3 && w.endsWith('es')) forms.push(w.slice(0,-2));
  if (w.length > 2 && w.endsWith('s')) forms.push(w.slice(0,-1));
  // -er/-est
  if (w.length > 4 && w.endsWith('er')) forms.push(w.slice(0,-2));
  if (w.length > 5 && w.endsWith('est')) forms.push(w.slice(0,-3));
  // -ly
  if (w.length > 4 && w.endsWith('ly')) forms.push(w.slice(0,-2));
  for (var i=0;i<forms.length;i++) {
    if (builtinDict[forms[i]]) return builtinDict[forms[i]];
  }
  return null;
}

var _apiLimitReached = false;

// ===== MYMEMORY API with 3s timeout =====
async function fetchTranslation(word) {
  if (_apiLimitReached) return null;
  var clean = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!clean) return null;
  try {
    var res = await fetch(
      'https://api.mymemory.translated.net/get?q='+encodeURIComponent(clean)+'&langpair=en|ja',
      { signal: AbortSignal.timeout(3000) }
    );
    var data = await res.json();
    if (data.responseStatus === 429 || (data.responseDetails && data.responseDetails.toLowerCase().includes('limit'))) {
      _apiLimitReached = true;
      return null;
    }
    if (data.responseStatus === 200 && data.responseData.translatedText) {
      var translation = data.responseData.translatedText;
      if (translation.toLowerCase() !== clean && !translation.includes('<')) {
        return translation;
      }
    }
  } catch(e) {}
  return null;
}

function tokenize(text){
  var raw=text.match(/\S+|\s+/g)||[],tokens=[];
  for(var i=0;i<raw.length;i++){
    var t=raw[i];
    if(/^\s+$/.test(t)){tokens.push({type:'space',value:t});continue;}
    var m=t.match(/^([^a-zA-Z']*)([a-zA-Z'][a-zA-Z'-]*)([^a-zA-Z']*)$/);
    if(m){if(m[1])tokens.push({type:'punct',value:m[1]});tokens.push({type:'word',value:m[2]});if(m[3])tokens.push({type:'punct',value:m[3]});}
    else tokens.push({type:'punct',value:t});
  }
  return tokens;
}

// ===== FIX 6: RUBY HTML builder =====
function makeRuby(word, reading, isIdiom) {
  var wClass = isIdiom ? 'word-token idiom-token' : 'word-token';
  return '<span class="'+wClass+'" onclick="highlightWord(this)"><ruby>'+escHtml(word)+'<rt>'+escHtml(reading)+'</rt></ruby></span>';
}
function makeWordOnly(word) {
  return '<span class="word-token" onclick="highlightWord(this)">'+escHtml(word)+'</span>';
}

// ===== BATCH processing =====
async function processBatch(batch, wordEntries, annotations, cache) {
  await Promise.all(batch.map(async function(idx){
    var word = wordEntries[idx].word;
    var lower = word.toLowerCase();
    var result = await fetchTranslation(lower);
    if (!result) {
      // Stemming fallback: try simplified forms via cache then API
      var stems = [];
      if (lower.endsWith('s') && lower.length > 2) stems.push(lower.slice(0,-1));
      if (lower.endsWith('ing') && lower.length > 5) stems.push(lower.slice(0,-3));
      if (lower.endsWith('ed') && lower.length > 4) stems.push(lower.slice(0,-2));
      if (lower.endsWith('ly') && lower.length > 4) stems.push(lower.slice(0,-2));
      if (lower.endsWith('er') && lower.length > 4) stems.push(lower.slice(0,-2));
      for (var si=0; si<stems.length && !result; si++) {
        result = cache[stems[si]] || await fetchTranslation(stems[si]);
      }
    }
    if (result) {
      cache[lower] = result;
      annotations[idx] = {type:'word', translation: result};
    } else if (word[0] === word[0].toUpperCase() && word[0] !== word[0].toLowerCase()) {
      annotations[idx] = {type:'skip'};
    } else {
      annotations[idx] = {type:'skip'};
    }
  }));
}

async function doTranslate(){
  if (!_dictLoaded) {
    document.getElementById('progressText').textContent = '辞書を読み込み中...';
    await loadDictionary();
  }
  var inputText=document.getElementById('inputText').value.trim();
  if(!inputText)return;
  var btn=document.getElementById('translateBtn');
  btn.disabled=true;
  document.getElementById('progressText').textContent='準備中...';
  document.getElementById('outputArea').innerHTML='';
  var cache=getCache(),tokens=tokenize(inputText),wordEntries=[];
  for(var ti=0;ti<tokens.length;ti++){if(tokens[ti].type==='word')wordEntries.push({index:ti,word:tokens[ti].value});}
  var wordSeq=wordEntries.map(function(e){return e.word.toLowerCase();}),annotations=new Array(wordEntries.length).fill(null),SKIP='__SKIP__';

  // Idiom pass
  for(var ii=0;ii<idioms.length;ii++){
    var phrase=idioms[ii][0],meaning=idioms[ii][1],parts=phrase.toLowerCase().split(' '),plen=parts.length;
    for(var wi=0;wi<=wordSeq.length-plen;wi++){
      if(annotations[wi]===SKIP)continue;
      var match=true;
      for(var pi=0;pi<plen;pi++){if(wordSeq[wi+pi]!==parts[pi]||annotations[wi+pi]===SKIP){match=false;break;}}
      if(match){
        var iwords=wordEntries.slice(wi,wi+plen).map(function(e){return e.word;}).join(' ');
        annotations[wi]={type:'idiom',words:iwords,meaning:meaning};
        for(var pi2=1;pi2<plen;pi2++)annotations[wi+pi2]=SKIP;
      }
    }
  }

  // Single word pass - dict + cache first
  var needLookup=[];
  for(var wi2=0;wi2<wordEntries.length;wi2++){
    if(annotations[wi2]!==null)continue;
    var word=wordEntries[wi2].word,lower=word.toLowerCase();
    if(skipWordsLv2[lower]){annotations[wi2]={type:'skip'};continue;}
    // FIX 1: stemming-aware dict lookup
    var dictResult = lookupInDict(word);
    if(dictResult){annotations[wi2]={type:'word',translation:dictResult};continue;}
    if(cache[lower]){annotations[wi2]={type:'word',translation:cache[lower]};continue;}
    needLookup.push(wi2);
  }

  var total=needLookup.length,done=0;
  function updateProgress(){document.getElementById('progressText').textContent=total>0?'翻訳中... '+done+'/'+total+'語':'';}
  updateProgress();

  // FIX 5: process in batches of 20
  var batchSize=20;
  for(var bi=0;bi<needLookup.length;bi+=batchSize){
    var batch=needLookup.slice(bi,bi+batchSize);
    await processBatch(batch,wordEntries,annotations,cache);
    done+=batch.length;
    updateProgress();
  }

  saveCache(cache);updateCacheInfo();

  if (_apiLimitReached) {
    document.getElementById('progressText').textContent = '';
    showApiLimitWarning();
  }

  // FIX 6: Build ruby HTML output
  var html='',wIdx=0;
  for(var ti2=0;ti2<tokens.length;ti2++){
    var tok=tokens[ti2];
    if(tok.type==='space'){html+=tok.value.replace(/\n/g,'<br>');continue;}
    if(tok.type==='punct'){html+=escHtml(tok.value);continue;}
    var wI=wIdx++,ann=annotations[wI];
    if(ann===SKIP)continue;
    if(!ann){html+=escHtml(tok.value);continue;}
    if(ann.type==='skip') html+=makeWordOnly(tok.value);
    else if(ann.type==='idiom') html+=makeRuby(ann.words,ann.meaning,true);
    else html+=makeRuby(tok.value,ann.translation,false);
  }

  document.getElementById('outputArea').innerHTML=html;
  document.getElementById('progressText').textContent=total>0?'完了（'+total+'語をAPI検索）':'完了';
  btn.disabled=false;
  currentResult=document.getElementById('outputArea').innerText||'';
  saveHistory(inputText,currentResult);
}

function showApiLimitWarning() {
  var existing = document.getElementById('apiLimitBanner');
  if (existing) return;
  var banner = document.createElement('div');
  banner.id = 'apiLimitBanner';
  banner.style.cssText = 'background:#2a1a0a;border:1px solid #aa6600;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:0.85rem;color:#ffaa44;line-height:1.6;';
  banner.innerHTML = '⚠️ <strong>本日の無料翻訳枠を使い切りました。</strong><br>'
    + '内蔵辞書とキャッシュの範囲で翻訳は続けられます。未翻訳の単語は明日（UTC 0時リセット）に再度お試しください。<br>'
    + '<span style="color:#888;font-size:0.8rem;">※ 一度調べた単語はキャッシュに保存されているため、同じ単語は引き続き表示されます。</span>';
  var actionRow = document.querySelector('.action-row');

}

function highlightWord(el){document.querySelectorAll('.word-token.highlighted').forEach(function(e){if(e!==el)e.classList.remove('highlighted');});el.classList.toggle('highlighted');}
function changeFontSize(d){currentFontSize=Math.max(12,Math.min(28,currentFontSize+d));document.getElementById('outputArea').style.fontSize=currentFontSize+'px';document.getElementById('inputText').style.fontSize=currentFontSize+'px';}

// ===== VOCAB (単語帳) =====
var VOCAB_KEY = 'yakuburi_vocab_v1';
var vocabDB = (function(){ try { return JSON.parse(localStorage.getItem(VOCAB_KEY)||'{}'); } catch(e){ return {}; } })();
function saveVocab() { try { localStorage.setItem(VOCAB_KEY, JSON.stringify(vocabDB)); } catch(e){} }
function addToVocab(en, ja) {
  var key = en.toLowerCase();
  if (!vocabDB[key]) vocabDB[key] = {en: en, ja: ja};
}
function buildVocab() {
  var outputArea = document.getElementById('outputArea');
  var rubies = outputArea.querySelectorAll('ruby');
  if (rubies.length === 0) { showToast('先に翻訳してください'); return; }
  rubies.forEach(function(ruby) {
    var word = ruby.childNodes[0] ? ruby.childNodes[0].textContent.trim() : '';
    var rt = ruby.querySelector('rt') ? ruby.querySelector('rt').textContent.trim() : '';
    if (word && rt) addToVocab(word, rt);
  });
  renderVocab();
  saveVocab();
  document.getElementById('vocabSection').style.display = 'block';
  document.getElementById('vocabSection').scrollIntoView({behavior:'smooth', block:'start'});
  showToast('単語帳を更新しました（' + Object.keys(vocabDB).length + '語）');
}
function renderVocab() {
  var list = document.getElementById('vocabList');
  var keys = Object.keys(vocabDB);
  if (keys.length === 0) { list.innerHTML = '<div style="color:#555;font-size:0.85rem;padding:8px;">単語がありません</div>'; return; }
  keys.sort();
  list.innerHTML = keys.map(function(k) {
    var item = vocabDB[k];
    return '<div class="vocab-card">'
      + '<span class="vocab-en">' + escHtml(item.en) + '</span>'
      + '<span class="vocab-ja">' + escHtml(item.ja) + '</span>'
      + '<button class="vocab-del" onclick="deleteVocab(\'' + escHtml(k) + '\')" title="削除">✕</button>'
      + '</div>';
  }).join('');
}
function deleteVocab(key) { delete vocabDB[key]; saveVocab(); renderVocab(); }
function clearVocab() { vocabDB = {}; saveVocab(); renderVocab(); showToast('単語帳をクリアしました'); }
function copyVocab() {
  var keys = Object.keys(vocabDB).sort();
  if (keys.length === 0) { showToast('単語がありません'); return; }
  var text = keys.map(function(k){ return vocabDB[k].en + '\t' + vocabDB[k].ja; }).join('\n');
  navigator.clipboard.writeText(text).then(function(){ showToast('単語帳をコピーしました（' + keys.length + '語）'); });
}
var _ttsPaused = false;
function _ttsUpdateButtons(playing, paused) {
  var playBtn = document.getElementById('ttsPlayBtn');
  var pauseBtn = document.getElementById('ttsPauseBtn');
  var stopBtn = document.getElementById('ttsStopBtn');
  playBtn.disabled = playing && !paused;
  pauseBtn.disabled = !playing;
  pauseBtn.textContent = paused ? '▶️ 再開' : '⏸ 一時停止';
  stopBtn.disabled = !playing;
  if (playing && !paused) { playBtn.classList.add('active'); } else { playBtn.classList.remove('active'); }
}
function ttsPlay() {
  if (!window.speechSynthesis) { alert('このブラウザは音声読み上げに対応していません'); return; }
  if (_ttsPaused && window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
    _ttsPaused = false;
    _ttsUpdateButtons(true, false);
    return;
  }
  var text = document.getElementById('inputText').value;
  if (!text.trim()) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.onstart = function() { _ttsPaused = false; _ttsUpdateButtons(true, false); };
  u.onend = function() { _ttsPaused = false; _ttsUpdateButtons(false, false); };
  u.onerror = function() { _ttsPaused = false; _ttsUpdateButtons(false, false); };
  window.speechSynthesis.speak(u);
}
function ttsPause() {
  if (!window.speechSynthesis) return;
  if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
    window.speechSynthesis.pause();
    _ttsPaused = true;
    _ttsUpdateButtons(true, true);
  } else if (window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
    _ttsPaused = false;
    _ttsUpdateButtons(true, false);
  }
}
function ttsStop() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  _ttsPaused = false;
  _ttsUpdateButtons(false, false);
}
function speakOutput() { ttsPlay(); }
function saveHistory(input,result){var now=new Date(),t=now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});translationHistory.unshift({input:input.substring(0,80),result:result,time:t});if(translationHistory.length>10)translationHistory.pop();renderHistory();}
function renderHistory(){var list=document.getElementById('historyList');list.innerHTML='';translationHistory.forEach(function(item){var div=document.createElement('div');div.className='history-item';div.innerHTML='<span class="hist-text">'+escHtml(item.input)+'</span><span class="hist-time">'+item.time+'</span>';(function(inp){div.onclick=function(){document.getElementById('inputText').value=inp;updateCharCount();};})(item.input);list.appendChild(div);});}
function getShareText(){var resultDiv=document.getElementById('outputArea');var rubies=resultDiv.querySelectorAll('ruby');var shareText='';if(rubies.length>0){rubies.forEach(function(ruby){var rb=ruby.querySelector('rb');var word=rb?rb.textContent:(ruby.childNodes[0]?ruby.childNodes[0].textContent:'');var rt=ruby.querySelector('rt')?ruby.querySelector('rt').textContent:'';shareText+=word+'（'+rt+'） ';});}else{shareText=resultDiv.innerText||'翻訳結果がありません';}return shareText.replace(/\n+/g,' ').replace(/\s+/g,' ').trim();}
async function shareCopy(){var text=getShareText();try{await navigator.clipboard.writeText(text);showToast('コピーしました！');}catch(e){showModal('コピー','テキストを手動でコピーしてください',text,true);}}
function shareMail(){var a=document.createElement('a');a.href='mailto:?subject='+encodeURIComponent('訳振り翻訳結果')+'&body='+encodeURIComponent(getShareText());a.click();}
function shareGmail(){var subject=encodeURIComponent('訳振り翻訳結果');var text=getShareText();if(text.length>1500)text=text.substring(0,1500);var body=encodeURIComponent(text);window.open('https://mail.google.com/mail/?view=cm&fs=1&su='+subject+'&body='+body,'_blank');}
function shareTwitter(){var text=getShareText();if(text.length>240)text=text.substring(0,240)+'...';window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&hashtags=英語学習','_blank');}
function shareTeams(){window.open('https://teams.microsoft.com/share?msgText='+encodeURIComponent(getShareText()),'_blank');}
function shareSlack(){showModal('💬 Slack','Slackを開いて貼り付けてください',getShareText(),true);}
function shareNotion(){showModal('📝 Notion','Notionに貼り付けてください',getShareText(),true);}
var _modalCopyText='';
function showModal(title,msg,text,showCopy){_modalCopyText=text;document.getElementById('modalTitle').textContent=title;document.getElementById('modalMsg').textContent=msg;document.getElementById('modalContent').innerHTML=showCopy?'<button class="modal-copy-btn" onclick="copyModalText()">📋 コピー</button>':'';document.getElementById('modalOverlay').classList.add('open');}
function copyModalText(){navigator.clipboard.writeText(_modalCopyText).then(function(){showToast('コピーしました！');});}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function showToast(msg){var toast=document.getElementById('toast');if(!toast){toast=document.createElement('div');toast.id='toast';toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4a9eff;color:#fff;padding:10px 20px;border-radius:8px;z-index:999;font-size:0.9rem;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}toast.textContent=msg;toast.style.opacity='1';clearTimeout(toast._t);toast._t=setTimeout(function(){toast.style.opacity='0';},2000);}
updateCacheInfo();updateCharCount();
loadDictionary(); // 辞書をプリロード
if (Object.keys(vocabDB).length > 0) {
  renderVocab();
  document.getElementById('vocabSection').style.display = 'block';
}

// ===== NEWS FEED =====
var newsFeeds = {
  bbc:       { name:'BBC News',     url:'https://feeds.bbci.co.uk/news/world/rss.xml' },
  reuters:   { name:'Reuters',      url:'https://news.google.com/rss/search?q=when:24h+allinurl:reuters.com&ceid=US:en&hl=en-US&gl=US' },
  guardian:  { name:'The Guardian', url:'https://www.theguardian.com/world/rss' },
  cnn:       { name:'CNN',          url:'http://rss.cnn.com/rss/edition_world.rss' },
  nhk:       { name:'NHK World',    url:'https://www3.nhk.or.jp/rss/news/cat0.xml' },
  aljazeera: { name:'Al Jazeera',   url:'https://www.aljazeera.com/xml/rss/all.xml' }
};
var _currentNewsMedia = null;

async function loadNews(mediaKey) {
  if (_currentNewsMedia === mediaKey) {
    // トグル：同じボタンを押したら閉じる
    _currentNewsMedia = null;
    document.getElementById('newsList').style.display = 'none';
    document.querySelectorAll('.news-media-btn').forEach(function(b){ b.classList.remove('active'); });
    return;
  }
  _currentNewsMedia = mediaKey;
  document.querySelectorAll('.news-media-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('onclick') === "loadNews('"+mediaKey+"')");
  });
  var listEl = document.getElementById('newsList');
  var itemsEl = document.getElementById('newsItems');
  listEl.style.display = 'block';
  itemsEl.innerHTML = '<div class="news-loading">📡 記事を取得中...</div>';

  try {
    var rssUrl = newsFeeds[mediaKey].url;
    var apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl) + '&count=10';
    var res = await fetch(apiUrl, { signal: AbortSignal.timeout(8000) });
    var data = await res.json();
    if (data.status !== 'ok' || !data.items || data.items.length === 0) {
      itemsEl.innerHTML = '<div class="news-error">⚠️ 記事を取得できませんでした。しばらく後で試してください。</div>';
      return;
    }
    itemsEl.innerHTML = '';
    data.items.forEach(function(item) {
      var title = item.title || '';
      var fullText = (item.content || item.description || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
      var preview = fullText.substring(0, 120);
      var date = item.pubDate ? new Date(item.pubDate).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      var link = item.link || '';
      var div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML = '<div class="news-item-title">' + escHtml(title) + '</div>'
        + (preview ? '<div class="news-item-desc">' + escHtml(preview) + (fullText.length > 120 ? '...' : '') + '</div>' : '')
        + '<div class="news-item-meta"><span>' + escHtml(newsFeeds[mediaKey].name) + '</span><span>' + date + '</span>'
        + (link ? '<button class="news-fetch-btn" style="color:#4a9eff;background:none;border:1px solid #2a3a5a;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.75rem;margin-left:auto;">元記事を取り込む ↓</button>' : '')
        + '</div>';
      (function(t, full, lnk) {
        // カード全体クリック → RSS本文を取り込む
        div.onclick = function(e) {
          if (e.target.classList.contains('news-fetch-btn')) return;
          var text = t + (full ? '\n\n' + full : '');
          document.getElementById('inputText').value = text;
          updateCharCount();
          document.getElementById('inputText').scrollIntoView({ behavior: 'smooth', block: 'center' });
          showToast('記事を取り込みました（' + text.length + '文字）');
        };
        // 「元記事を取り込む」ボタン → URLから全文fetch
        var btn = div.querySelector('.news-fetch-btn');
        if (btn) {
          btn.onclick = async function(e) {
            e.stopPropagation();
            btn.textContent = '取得中...';
            btn.disabled = true;
            try {
              var proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(lnk);
              var res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
              var data = await res.json();
              var html = data.contents || '';
              // <p>タグの中身だけ抽出してテキスト化
              var paragraphs = [];
              var pMatches = html.match(/<p[^>]*>([\s\S]*?)<\/p>/gi) || [];
              pMatches.forEach(function(p) {
                var text = p.replace(/<[^>]+>/g, '').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').trim();
                if (text.length > 30) paragraphs.push(text);
              });
              if (paragraphs.length > 0) {
                var articleText = t + '\n\n' + paragraphs.join('\n\n');
                document.getElementById('inputText').value = articleText;
                updateCharCount();
                document.getElementById('inputText').scrollIntoView({ behavior: 'smooth', block: 'center' });
                showToast('元記事を取り込みました（' + articleText.length + '文字）');
                btn.textContent = '取り込み済み ✓';
              } else {
                // 全文取得できなかった場合はRSS本文で代用
                var fallback = t + (full ? '\n\n' + full : '');
                document.getElementById('inputText').value = fallback;
                updateCharCount();
                showToast('全文取得できませんでした。RSS本文を取り込みました');
                btn.textContent = '元記事を取り込む ↓';
                btn.disabled = false;
              }
            } catch(err) {
              showToast('取得に失敗しました: ' + err.message);
              btn.textContent = '元記事を取り込む ↓';
              btn.disabled = false;
            }
          };
        }
      })(title, fullText, link);
      itemsEl.appendChild(div);
    });
  } catch(e) {
    console.error('News fetch error:', e);
    itemsEl.innerHTML = '<div class="news-error">⚠️ 通信エラーが発生しました。ネットワークを確認してください。<br><small style="color:#666">' + e.message + '</small></div>';
  }
}
